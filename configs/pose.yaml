project:
  name: "Adaptive Multi-Modal Fusion Transformer - Pose Branch"
  experiment_name: "pose_branch"

data:
  train_csv: "splits/train.csv"
  val_csv: "splits/val.csv"
  test_csv: "splits/test.csv"
  pose_dir: "datasets/pose_data"
  num_classes: 8
  num_frames: 16

model:
  input_dim: 258
  d_model: 256
  nhead: 4
  transformer_layers: 4
  dropout: 0.1

training:
  batch_size: 4
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: "adamw"

paths:
  checkpoint_dir: "checkpoints"
  best_model: "checkpoints/best_pose_model.pth"
  results_dir: "results"
  training_log: "results/training_log_pose.csv"
