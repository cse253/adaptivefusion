project:
  name: "Adaptive Multi-Modal Fusion Transformer - Adaptive Fusion"
  experiment_name: "adaptive_fusion"

data:
  train_csv: "splits/train.csv"
  val_csv: "splits/val.csv"
  test_csv: "splits/test.csv"
  rgb_emb_dir: "datasets/rgb_embeddings"
  pose_dir: "datasets/pose_data"
  num_classes: 8
  num_frames: 16

model:
  rgb_input_dim: 2048
  rgb_d_model: 512
  pose_input_dim: 258
  pose_d_model: 256
  nhead_rgb: 8
  nhead_pose: 4
  num_transformer_layers: 4
  dropout: 0.1

training:
  batch_size: 4
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: "adamw"

paths:
  checkpoint_dir: "checkpoints"
  best_model: "checkpoints/best_adaptive_model.pth"
  results_dir: "results"
  training_log: "results/adaptive_training_log.csv"
